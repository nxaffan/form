 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affan HTML Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="day-mode">

<button id="mode-toggle" class="mode-toggle">🌙</button>

<div class="particles">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
    <div class="particle p7"></div>
    <div class="particle p8"></div>
    <div class="particle p9"></div>
    <div class="particle p10"></div>
</div>

<div class="form-container">
    <h2>Create Account</h2>

    <form id="form">

        <div class="name-row">
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
        </div>

        <input type="email" placeholder="Email Address" required>

        <input type="number" placeholder="Phone Number" required>

        <input type="text" placeholder="Address" required>

        <div class="date-row">
            <input type="number" placeholder="Date" min="1" max="31" required>
            <select placeholder="Month" required>
                <option value="">Month</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            <input type="number" placeholder="Year" min="1900" required>
        </div>

        <input type="password" placeholder="Password" required>

        <label class="gender-label">Gender :</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label><input type="radio" name="gender" value="other"> Other</label>
        </div>

        <div class="checkbox-group">
            <label><input type="checkbox" name="terms" required> I agree to Terms & Conditions</label>
        </div>

        <div class="button-group">
            <button type="submit">Sign Up</button>
            <button type="reset">Reset</button>
        </div>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
